name: Daily Scrape & Deploy

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 6 AM UTC
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          echo "=== DEBUG INFO ==="
          echo "Node version: $(node --version)"
          echo "Python version: $(python --version)"
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          echo "Contents of scraper/requirements.txt:"
          cat scraper/requirements.txt
          echo "=================="
          pip install -r scraper/requirements.txt
          npm ci

      - name: Run scraper
        env:
          DECATHLON_AFFILIATE_ID: ${{ secrets.DECATHLON_AFFILIATE_ID }}
        run: |
          echo "=== RUN SCRAPER DEBUG ==="
          echo "Current directory: $(pwd)"
          echo "Files in scraper/:"
          ls -la scraper/
          echo "========================"
          python scraper/scrape.py

      - name: Build Astro site
        run: |
          echo "=== BUILD DEBUG ==="
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          echo "==================="
          npx astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: princedumonde  # Change to your project name